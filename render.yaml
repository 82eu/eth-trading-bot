services:
  - type: web
    name: eth-trading-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: MOCK_MODE
        value: "true"
      - key: PORT
        value: "10000"
      - key: OKX_API_KEY
        sync: false
      - key: OKX_API_SECRET
        sync: false
      - key: OKX_PASSPHRASE
        sync: false
      - key: SIMULATE
        value: "true"
