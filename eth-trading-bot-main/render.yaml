services:
  - type: web
    name: eth-trading-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: MOCK_MODE
        value: "false"
      - key: PORT
        value: "10000"
      - key: SIMULATE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.7"
