<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETH大军复苏自动版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            min-height: 100vh;
        }
        .header {
            background: #1a1f2e;
            padding: 16px 24px;
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 20px;
            background: linear-gradient(135deg, #627eea, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .mode-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .mode-badge.mock { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .mode-badge.real { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 14px 18px;
        }
        .stat-card .label { font-size: 12px; color: #718096; margin-bottom: 4px; }
        .stat-card .value { font-size: 22px; font-weight: 600; }
        .stat-card .value.positive { color: #22c55e; }
        .stat-card .value.negative { color: #ef4444; }
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
        .chart-container {
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 20px;
        }
        .side-panel { display: flex; flex-direction: column; gap: 16px; }
        .panel-card {
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 18px;
        }
        .panel-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
        }
        .leverage-selector { margin-bottom: 8px; }
        .leverage-selector label { font-size: 12px; color: #718096; display: block; margin-bottom: 6px; }
        .lev-btns { display: flex; gap: 4px; }
        .lev-btn {
            flex: 1;
            padding: 6px 4px;
            background: #2d3748;
            border: none;
            border-radius: 6px;
            color: #a0aec0;
            font-size: 11px;
            cursor: pointer;
        }
        .lev-btn:hover { background: #4a5568; }
        .lev-btn.active { background: #627eea; color: white; }
        .quick-actions { display: flex; gap: 8px; margin-top: 10px; }
        .quick-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .quick-btn.long { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .quick-btn.long:hover { background: rgba(34, 197, 94, 0.25); }
        .quick-btn.short { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .quick-btn.short:hover { background: rgba(239, 68, 68, 0.25); }
        .input-group { margin-bottom: 10px; }
        .input-group label { font-size: 12px; color: #718096; display: block; margin-bottom: 4px; }
        .input-group input {
            width: 100%;
            padding: 8px 10px;
            background: #0f1419;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: #e7e9ea;
            font-size: 13px;
        }
        .input-group input:focus { outline: none; border-color: #627eea; }
        .close-btn {
            width: 100%;
            padding: 10px;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .close-btn:hover { background: rgba(239, 68, 68, 0.25); }
        .symbol-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 14px;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .symbol-tab {
            padding: 6px 12px;
            background: #2d3748;
            border: none;
            border-radius: 6px;
            color: #a0aec0;
            font-size: 12px;
            cursor: pointer;
        }
        .symbol-tab:hover { background: #4a5568; }
        .symbol-tab.active { background: #627eea; color: white; }
        .symbol-tab .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
            background: #718096;
        }
        .symbol-tab.active .status-dot { background: #22c55e; }
        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .config-row.three { grid-template-columns: 1fr 1fr 1fr; }
        .config-item { margin-bottom: 10px; }
        .config-item label { font-size: 12px; color: #718096; display: block; margin-bottom: 4px; }
        .config-item input, .config-item select {
            width: 100%;
            padding: 7px 10px;
            background: #0f1419;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: #e7e9ea;
            font-size: 12px;
        }
        .config-item input:focus, .config-item select:focus { outline: none; border-color: #627eea; }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .checkbox-row input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; }
        .checkbox-row label { font-size: 12px; color: #a0aec0; cursor: pointer; }
        .auto-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .auto-btn.start { background: linear-gradient(135deg, #627eea, #8b5cf6); color: white; }
        .auto-btn.start:hover { opacity: 0.9; }
        .auto-btn.stop { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
        .auto-btn.stop:hover { background: rgba(239, 68, 68, 0.3); }
        .refresh-btn {
            width: 100%;
            padding: 8px;
            background: rgba(98, 126, 234, 0.15);
            color: #627eea;
            border: 1px solid rgba(98, 126, 234, 0.3);
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
        }
        .refresh-btn:hover { background: rgba(98, 126, 234, 0.25); }
        .log-panel {
            max-height: 200px;
            overflow-y: auto;
            background: #0f1419;
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            font-family: monospace;
        }
        .log-item { padding: 2px 0; border-bottom: 1px solid #1a1f2e; }
        .log-item:last-child { border-bottom: none; }
        .log-item .time { color: #718096; margin-right: 6px; }
        .log-item.info { color: #a0aec0; }
        .log-item.signal { color: #f59e0b; }
        .log-item.success { color: #22c55e; }
        .log-item.error { color: #ef4444; }
        .tf-selector { display: flex; gap: 4px; flex-wrap: wrap; }
        .tf-chip {
            padding: 4px 8px;
            background: #2d3748;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            user-select: none;
        }
        .tf-chip.selected { background: #627eea; color: white; }
        .ema-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .ema-info div { color: #718096; }
        .ema-info span { color: #e7e9ea; font-weight: 500; }
        .test-btn {
            padding: 6px 12px;
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
        }
        .test-btn:hover { background: rgba(245, 158, 11, 0.25); }
        .symbol-selector { margin-bottom: 12px; }
        .symbol-selector label { font-size: 12px; color: #718096; display: block; margin-bottom: 4px; }
        .symbol-selector select {
            width: 100%;
            padding: 8px 10px;
            background: #0f1419;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: #e7e9ea;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>ETH大军复苏自动版</h1>
            <span class="mode-badge mock" id="modeBadge">模拟模式</span>
        </div>
        <div class="header-right">
            <span style="font-size:12px;color:#718096;">当前价格: <strong id="currentPrice" style="color:#e7e9ea;">--</strong></span>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">账户权益</div>
                <div class="value" id="totalEquity">--</div>
            </div>
            <div class="stat-card">
                <div class="label">可用余额</div>
                <div class="value" id="availableBalance">--</div>
            </div>
            <div class="stat-card">
                <div class="label">持仓方向</div>
                <div class="value" id="positionSide">--</div>
            </div>
            <div class="stat-card">
                <div class="label">持仓盈亏</div>
                <div class="value" id="positionPnl">--</div>
            </div>
            <div class="stat-card">
                <div class="label">累计交易</div>
                <div class="value" id="totalTrades">--</div>
            </div>
        </div>

        <div class="main-grid">
            <div>
                <div class="chart-container">
                    <div class="symbol-selector">
                        <label>交易对</label>
                        <select id="chartSymbol">
                            <option value="ETH-USDT-SWAP">ETH-USDT-SWAP</option>
                            <option value="BTC-USDT-SWAP">BTC-USDT-SWAP</option>
                        </select>
                    </div>
                    <canvas id="klineChart" height="300"></canvas>
                </div>
            </div>

            <div class="side-panel">
                <div class="panel-card">
                    <div class="panel-title">快速开单</div>
                    <div class="leverage-selector">
                        <label>杠杆倍数</label>
                        <div class="lev-btns">
                            <button class="lev-btn" data-lev="5">5x</button>
                            <button class="lev-btn" data-lev="10">10x</button>
                            <button class="lev-btn" data-lev="20">20x</button>
                            <button class="lev-btn" data-lev="50">50x</button>
                            <button class="lev-btn active" data-lev="100">100x</button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>金额 (USDT)</label>
                        <input type="number" id="orderAmount" value="100" step="1">
                    </div>
                    <div class="input-group">
                        <label>止盈 (价格点数)</label>
                        <input type="number" id="tpPrice" value="" placeholder="留空不设置">
                    </div>
                    <div class="input-group">
                        <label>止损 (价格点数)</label>
                        <input type="number" id="slPrice" value="" placeholder="留空不设置">
                    </div>
                    <div class="quick-actions">
                        <button class="quick-btn long" onclick="placeOrder('long')">做多</button>
                        <button class="quick-btn short" onclick="placeOrder('short')">做空</button>
                    </div>
                    <button class="close-btn" onclick="closePosition()">平仓</button>
                </div>

                <div class="panel-card">
                    <div class="panel-title">EMA自动交易</div>
                    <div class="symbol-tabs" id="symbolTabs"></div>
                    <div id="symbolConfigPanel"></div>
                    <button class="auto-btn start" id="autoBtn" onclick="toggleAuto()">启动自动交易</button>
                    <button class="refresh-btn" onclick="refreshPending()">手动刷新挂单</button>
                    <div class="ema-info" style="margin-top:12px;">
                        <div>EMA180: <span id="ema180Val">--</span></div>
                        <div>EMA250: <span id="ema250Val">--</span></div>
                        <div>趋势: <span id="trendVal">--</span></div>
                        <div>区间: <span id="zoneVal">--</span></div>
                    </div>
                </div>

                <div class="panel-card">
                    <div class="panel-title">运行日志</div>
                    <div class="log-panel" id="logPanel"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSymbol = 'ETH-USDT-SWAP';
        let currentLeverage = 100;
        let autoRunning = false;
        let symbolConfigs = {};
        let activeSymbolTab = 'ETH-USDT-SWAP';
        let chart = null;
        let enabledTfsMap = {};

        function initChart() {
            const ctx = document.getElementById('klineChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        { label: '价格', data: [], borderColor: '#627eea', borderWidth: 1, pointRadius: 0, yAxisID: 'y' },
                        { label: 'EMA180', data: [], borderColor: '#22c55e', borderWidth: 1, pointRadius: 0, borderDash: [3, 3], yAxisID: 'y' },
                        { label: 'EMA250', data: [], borderColor: '#ef4444', borderWidth: 1, pointRadius: 0, borderDash: [3, 3], yAxisID: 'y' },
                    ]
                },
                options: {
                    responsive: true,
                    interaction: { intersect: false, mode: 'index' },
                    scales: {
                        x: { type: 'time', time: { unit: 'hour' }, grid: { color: '#1a1f2e' }, ticks: { color: '#718096' } },
                        y: { position: 'right', grid: { color: '#1a1f2e' }, ticks: { color: '#718096' } }
                    },
                    plugins: { legend: { labels: { color: '#a0aec0' } } }
                }
            });
        }

        async function loadCandles() {
            try {
                const res = await fetch(`/api/candles?symbol=${currentSymbol}&timeframe=1h&limit=200`);
                const data = await res.json();
                if (data.code === 0 && chart) {
                    const candles = data.data;
                    chart.data.datasets[0].data = candles.map(c => ({ x: c.time, y: c.close }));
                    chart.data.datasets[1].data = candles.map((c, i) => c.ma_fast ? { x: c.time, y: c.ma_fast } : null);
                    chart.data.datasets[2].data = candles.map((c, i) => c.ma_slow ? { x: c.time, y: c.ma_slow } : null);
                    chart.update('none');
                    if (candles.length > 0) {
                        document.getElementById('currentPrice').textContent = candles[candles.length-1].close.toFixed(2);
                    }
                }
            } catch(e) { console.error(e); }
        }

        async function loadBalance() {
            try {
                const res = await fetch('/api/balance');
                const data = await res.json();
                if (data.code === 0) {
                    document.getElementById('totalEquity').textContent = data.data.equity?.toFixed(2) || '--';
                    document.getElementById('availableBalance').textContent = data.data.available?.toFixed(2) || '--';
                }
            } catch(e) { console.error(e); }
        }

        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                if (data.code === 0) {
                    const d = data.data;
                    document.getElementById('currentPrice').textContent = d.current_price?.toFixed(2) || '--';
                    const posSide = d.position_side;
                    document.getElementById('positionSide').textContent = posSide ? (posSide === 'long' ? '多' : '空') : '无';
                    const pnlEl = document.getElementById('positionPnl');
                    if (d.pnl_pct != null) {
                        pnlEl.textContent = `${d.pnl_pct.toFixed(2)}%`;
                        pnlEl.className = 'value ' + (d.pnl_pct >= 0 ? 'positive' : 'negative');
                    } else {
                        pnlEl.textContent = '--';
                        pnlEl.className = 'value';
                    }
                    currentLeverage = d.leverage || 100;
                    updateLeverageButtons();
                }
            } catch(e) { console.error(e); }
        }

        async function loadAutoStatus() {
            try {
                const res = await fetch('/api/auto/status');
                const data = await res.json();
                if (data.code === 0) {
                    const d = data.data;
                    autoRunning = d.running;
                    updateAutoButton();
                    if (d.symbol_configs) {
                        symbolConfigs = d.symbol_configs;
                        renderSymbolTabs();
                        renderSymbolConfig();
                    }
                    if (d.logs) {
                        renderLogs(d.logs);
                    }
                    if (d.analysis && d.analysis[activeSymbolTab]) {
                        const a = d.analysis[activeSymbolTab]['5m'] || d.analysis[activeSymbolTab]['1h'] || {};
                        if (a.ema180 != null) document.getElementById('ema180Val').textContent = a.ema180.toFixed(2);
                        if (a.ema250 != null) document.getElementById('ema250Val').textContent = a.ema250.toFixed(2);
                        if (a.trend) document.getElementById('trendVal').textContent = a.trend === 'long' ? '多' : '空';
                        if (a.ema_high != null && a.ema_low != null) {
                            document.getElementById('zoneVal').textContent = `${a.ema_low.toFixed(2)} - ${a.ema_high.toFixed(2)}`;
                        }
                    }
                }
            } catch(e) { console.error(e); }
        }

        function renderSymbolTabs() {
            const container = document.getElementById('symbolTabs');
            const symbols = Object.keys(symbolConfigs);
            if (symbols.length === 0) {
                container.innerHTML = '';
                return;
            }
            if (!symbolConfigs[activeSymbolTab]) {
                activeSymbolTab = symbols[0];
            }
            container.innerHTML = symbols.map(sym => `
                <button class="symbol-tab ${sym === activeSymbolTab ? 'active' : ''}" onclick="switchSymbolTab('${sym}')">
                    <span class="status-dot"></span>${sym.replace('-USDT-SWAP', '')}
                </button>
            `).join('');
        }

        function switchSymbolTab(sym) {
            activeSymbolTab = sym;
            currentSymbol = sym;
            renderSymbolTabs();
            renderSymbolConfig();
            loadCandles();
        }

        function renderSymbolConfig() {
            const cfg = symbolConfigs[activeSymbolTab] || {};
            enabledTfsMap[activeSymbolTab] = cfg.enabled_tfs || ['5m', '15m'];
            const tfs = ['5m', '15m', '30m', '1h', '4h'];
            const container = document.getElementById('symbolConfigPanel');
            container.innerHTML = `
                <div class="checkbox-row">
                    <input type="checkbox" id="cfgEnabled" ${cfg.enabled ? 'checked' : ''}>
                    <label for="cfgEnabled">启用该币种</label>
                </div>
                <div class="config-item">
                    <label>启用周期</label>
                    <div class="tf-selector" id="tfSelector">
                        ${tfs.map(tf => `
                            <span class="tf-chip ${(cfg.enabled_tfs || []).includes(tf) ? 'selected' : ''}" data-tf="${tf}" onclick="toggleTf('${tf}')">${tf}</span>
                        `).join('')}
                    </div>
                </div>
                <div class="config-row">
                    <div class="config-item">
                        <label>总金额 (U)</label>
                        <input type="number" id="cfgTotalAmount" value="${cfg.total_amount_usdt || 100}">
                    </div>
                    <div class="config-item">
                        <label>分批份数</label>
                        <input type="number" id="cfgNumEntries" value="${cfg.num_entries || 2}" min="1" max="3">
                    </div>
                </div>
                <div class="config-row">
                    <div class="config-item">
                        <label>止盈点数</label>
                        <input type="number" id="cfgTpPoints" value="${cfg.tp_points || 50}">
                    </div>
                    <div class="config-item">
                        <label>止损点数</label>
                        <input type="number" id="cfgSlPoints" value="${cfg.sl_points || 30}">
                    </div>
                </div>
                <div class="config-row">
                    <div class="config-item">
                        <label>缓冲宽度</label>
                        <input type="number" id="cfgBufferWidth" value="${cfg.buffer_width || 10}">
                    </div>
                    <div class="config-item">
                        <label>杠杆倍数</label>
                        <input type="number" id="cfgLeverage" value="${cfg.leverage || 100}">
                    </div>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="cfgPendingMode" ${cfg.pending_mode ? 'checked' : ''}>
                    <label for="cfgPendingMode">挂单模式（每5分钟更新）</label>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="cfgFeishuEnabled" ${cfg.feishu_enabled !== false ? 'checked' : ''}>
                    <label for="cfgFeishuEnabled">飞书消息推送</label>
                </div>
                <div style="display:flex;gap:6px;margin-top:4px;">
                    <button class="test-btn" onclick="testOpenOrder('5m', 'long')">测5m多</button>
                    <button class="test-btn" onclick="testOpenOrder('5m', 'short')">测5m空</button>
                    <button class="test-btn" onclick="saveSymbolConfig()">保存配置</button>
                </div>
            `;
        }

        function toggleTf(tf) {
            const tfs = enabledTfsMap[activeSymbolTab] || [];
            const idx = tfs.indexOf(tf);
            if (idx >= 0) {
                tfs.splice(idx, 1);
            } else {
                tfs.push(tf);
            }
            enabledTfsMap[activeSymbolTab] = tfs;
            const chips = document.querySelectorAll('#tfSelector .tf-chip');
            chips.forEach(chip => {
                if (chip.dataset.tf === tf) {
                    chip.classList.toggle('selected');
                }
            });
        }

        async function saveSymbolConfig() {
            const config = {
                symbol: activeSymbolTab,
                enabled: document.getElementById('cfgEnabled').checked,
                enabled_tfs: enabledTfsMap[activeSymbolTab] || ['5m', '15m'],
                total_amount_usdt: parseFloat(document.getElementById('cfgTotalAmount').value),
                num_entries: parseInt(document.getElementById('cfgNumEntries').value),
                tp_points: parseFloat(document.getElementById('cfgTpPoints').value),
                sl_points: parseFloat(document.getElementById('cfgSlPoints').value),
                buffer_width: parseFloat(document.getElementById('cfgBufferWidth').value),
                leverage: parseInt(document.getElementById('cfgLeverage').value),
                pending_mode: document.getElementById('cfgPendingMode').checked,
                feishu_enabled: document.getElementById('cfgFeishuEnabled').checked,
            };
            try {
                const res = await fetch('/api/auto/symbol_config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await res.json();
                if (data.code === 0) {
                    alert('配置已保存');
                    loadAutoStatus();
                } else {
                    alert('保存失败: ' + data.msg);
                }
            } catch(e) {
                alert('保存失败: ' + e);
            }
        }

        async function testOpenOrder(tf, direction) {
            if (!confirm(`确定在${activeSymbolTab} ${tf}周期测试开${direction}？`)) return;
            try {
                const res = await fetch('/api/auto/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol: activeSymbolTab, tf, direction })
                });
                const data = await res.json();
                if (data.code === 0) {
                    alert('测试开单成功');
                    loadAutoStatus();
                } else {
                    alert('测试开单失败: ' + data.msg);
                }
            } catch(e) {
                alert('测试开单失败: ' + e);
            }
        }

        function updateAutoButton() {
            const btn = document.getElementById('autoBtn');
            if (autoRunning) {
                btn.textContent = '停止自动交易';
                btn.className = 'auto-btn stop';
            } else {
                btn.textContent = '启动自动交易';
                btn.className = 'auto-btn start';
            }
        }

        async function toggleAuto() {
            try {
                const url = autoRunning ? '/api/auto/stop' : '/api/auto/start';
                const res = await fetch(url, { method: 'POST' });
                const data = await res.json();
                if (data.code === 0) {
                    autoRunning = !autoRunning;
                    updateAutoButton();
                }
            } catch(e) { console.error(e); }
        }

        async function refreshPending() {
            try {
                const res = await fetch('/api/auto/refresh_pending', { method: 'POST' });
                const data = await res.json();
                if (data.code === 0) {
                    alert(data.msg);
                    loadAutoStatus();
                } else {
                    alert('刷新失败: ' + data.msg);
                }
            } catch(e) {
                alert('刷新失败: ' + e);
            }
        }

        function updateLeverageButtons() {
            document.querySelectorAll('.lev-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.lev) === currentLeverage);
            });
        }

        document.querySelectorAll('.lev-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                currentLeverage = parseInt(this.dataset.lev);
                updateLeverageButtons();
                setLeverage(currentLeverage);
            });
        });

        async function setLeverage(lev) {
            try {
                await fetch('/api/set_leverage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol: currentSymbol, leverage: lev })
                });
            } catch(e) { console.error(e); }
        }

        async function placeOrder(side) {
            const amount = parseFloat(document.getElementById('orderAmount').value);
            const tp = document.getElementById('tpPrice').value;
            const sl = document.getElementById('slPrice').value;
            if (!amount || amount <= 0) { alert('请输入金额'); return; }
            try {
                const res = await fetch('/api/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symbol: currentSymbol,
                        side: side === 'long' ? 'buy' : 'sell',
                        pos_side: side,
                        amount_usdt: amount,
                        type: 'market',
                        leverage: currentLeverage,
                        take_profit: tp ? parseFloat(tp) : null,
                        stop_loss: sl ? parseFloat(sl) : null,
                    })
                });
                const data = await res.json();
                if (data.code === 0) {
                    alert('下单成功');
                    loadStatus();
                } else {
                    alert('下单失败: ' + data.msg);
                }
            } catch(e) {
                alert('下单失败: ' + e);
            }
        }

        async function closePosition() {
            if (!confirm('确定平仓？')) return;
            try {
                const res = await fetch('/api/close_position', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol: currentSymbol })
                });
                const data = await res.json();
                if (data.code === 0) {
                    alert('平仓成功');
                    loadStatus();
                } else {
                    alert('平仓失败: ' + data.msg);
                }
            } catch(e) {
                alert('平仓失败: ' + e);
            }
        }

        function renderLogs(logs) {
            const panel = document.getElementById('logPanel');
            panel.innerHTML = logs.slice().reverse().map(log => `
                <div class="log-item ${log.level}">
                    <span class="time">${log.time}</span>${log.msg}
                </div>
            `).join('');
        }

        document.getElementById('chartSymbol').addEventListener('change', function() {
            currentSymbol = this.value;
            loadCandles();
            loadStatus();
        });

        initChart();
        loadCandles();
        loadBalance();
        loadStatus();
        loadAutoStatus();

        setInterval(() => {
            loadCandles();
            loadBalance();
            loadStatus();
            loadAutoStatus();
        }, 30000);
    </script>
</body>
</html>
